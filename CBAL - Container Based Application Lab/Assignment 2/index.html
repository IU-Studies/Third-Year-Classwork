<!DOCTYPE html>
<html>

<head>
    <title>Hello World</title>
    <style>
        body {
            background-color: #1e1e2f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            color: #00d4ff;
        }

        p {
            font-size: 20px;
            color: #cccccc;
        }

        .box {
            background-color: #2c2c3e;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Hello, World!</h1>
        <p>This is my styled website.
        </p>

    </div>
</body>

</html>
